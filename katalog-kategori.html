<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Katalog – Ghote Florist</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .kat-hero {
      background: var(--forest);
      padding: 48px 40px 44px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .kat-hero::before {
      content: "🌱"; position: absolute; font-size: 190px; opacity: .05;
      left: -40px; top: -40px; user-select: none; pointer-events: none;
    }
    .kat-hero::after {
      content: "🌿"; position: absolute; font-size: 180px; opacity: .05;
      right: -20px; bottom: -40px; user-select: none; pointer-events: none;
    }
    .kat-back {
      position: absolute; top: 20px; left: 28px;
      display: inline-flex; align-items: center; gap: 6px;
      color: rgba(255,255,255,.65); font-size: 12px; font-weight: 500;
      letter-spacing: .8px; text-transform: uppercase; text-decoration: none;
      transition: color .2s; z-index: 2;
    }
    .kat-back:hover { color: #fff; }
    .kat-hero h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(36px, 5vw, 64px); font-weight: 300;
      color: #fff; line-height: 1.1; margin: 0 0 10px;
      position: relative; z-index: 2;
    }
    .kat-hero h1 em { font-style: normal; color: #8fc99a; }
    .kat-hero-sub {
      font-size: 13px; color: rgba(255,255,255,.5);
      letter-spacing: .5px; position: relative; z-index: 2;
    }

    .kat-filter {
      background: var(--warm-white);
      border-bottom: 1px solid var(--cream-border);
      padding: 0 40px;
      display: flex; justify-content: center; gap: 0;
      overflow-x: auto; scrollbar-width: none;
      position: sticky; top: 70px; z-index: 50;
    }
    .kat-filter::-webkit-scrollbar { display: none; }
    .kat-filter-btn {
      padding: 18px 24px; font-family: 'DM Sans', sans-serif;
      font-size: 12px; font-weight: 500; letter-spacing: .8px;
      text-transform: uppercase; color: var(--text-light);
      background: none; border: none; border-bottom: 2px solid transparent;
      cursor: pointer; white-space: nowrap; transition: color .2s, border-color .2s;
    }
    .kat-filter-btn:hover { color: var(--forest); }
    .kat-filter-btn.active { color: var(--forest); border-bottom-color: var(--forest); font-weight: 600; }

    .kat-body { max-width: 1280px; margin: 0 auto; padding: 48px 40px 80px; background: var(--cream); }

    .kat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px; margin-bottom: 64px;
    }
    .kat-grid .product-card { width: 100%; flex: none; background: var(--warm-white); }

    .kat-empty { text-align: center; padding: 80px 20px; color: var(--text-light); }
    .kat-empty-icon { font-size: 60px; margin-bottom: 16px; }

    .kat-loading {
      text-align: center; padding: 80px 20px; color: var(--text-light);
    }
    .kat-loading-icon { font-size: 40px; margin-bottom: 12px; animation: spin 2s linear infinite; display: inline-block; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .kat-wa-banner {
      background: var(--forest); border-radius: 16px;
      padding: 40px; text-align: center; margin-top: 16px;
    }
    .kat-wa-banner p {
      font-family: 'Cormorant Garamond', serif; font-size: 28px;
      font-weight: 300; color: #fff; margin-bottom: 20px; line-height: 1.4;
    }
    .kat-wa-banner p em { font-style: italic; color: #8fc99a; }
    .btn-wa-banner {
      display: inline-flex; align-items: center; gap: 10px;
      background: #25D366; color: #fff; padding: 14px 28px;
      border-radius: 50px; font-size: 14px; font-weight: 600;
      text-decoration: none; transition: transform .2s, box-shadow .2s;
    }
    .btn-wa-banner:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,211,102,.3); }

    @media (max-width: 768px) {
      .kat-hero { padding: 48px 20px 36px; }
      .kat-body { padding: 32px 16px 60px; }
      .kat-filter { padding: 0 8px; justify-content: flex-start; }
      .kat-filter-btn { padding: 16px 14px; font-size: 11px; }
      .kat-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
    }
    @media (max-width: 480px) {
      .kat-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-inner">
      <a href="index.html" class="logo">Ghote<span>Florist</span></a>
      <nav>
        <a href="index.html#beranda">Beranda</a>
        <a href="index.html#tentang-kami">Tentang Kami</a>
        <a href="index.html#produk">Produk</a>
        <a href="index.html#kontak-lokasi">Lokasi</a>
        <a href="index.html#kontak-lokasi">Hubungi Kami</a>
      </nav>
    </div>
  </header>

  <div class="kat-hero" id="kat-hero">
    <a href="index.html#produk" class="kat-back">&#8592; Kembali</a>
    <h1 id="kat-judul">Katalog <em>Produk</em></h1>
    <p class="kat-hero-sub" id="kat-sub">Memuat produk...</p>
  </div>

  <div class="kat-filter" id="kat-filter"></div>

  <div class="kat-body">
    <div id="kat-grid-container">
      <div class="kat-loading">
        <div class="kat-loading-icon">🌸</div>
        <p style="font-size:14px">Memuat produk...</p>
      </div>
    </div>

    <div class="kat-wa-banner">
      <p>Tidak menemukan yang kamu cari?<br>Kami menerima pesanan <em>custom</em>!</p>
      <a class="btn-wa-banner" href="https://wa.me/qr/R6Q27WA5QKNTK1" target="_blank">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/>
          <path d="M12 0C5.373 0 0 5.373 0 12c0 2.124.558 4.121 1.533 5.857L.057 23.886a.5.5 0 0 0 .613.613l6.029-1.476A11.953 11.953 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 0 1-5.006-1.371l-.36-.213-3.724.912.928-3.614-.235-.372A9.818 9.818 0 1 1 12 21.818z"/>
        </svg>
        Hubungi via WhatsApp
      </a>
    </div>
  </div>

  <script src="js/sheets.js"></script>
  <script>
    const KATEGORI_ORDER = [
      "Buket Bunga","Buket Boneka","Buket Uang","Buket Makanan","Buket Thumbelina", "Buket Mini",
    ];
    const WARNA_CARD = ["p1","p2","p3","p4","p5","p6"];

    function formatHarga(n) { return "Rp " + n.toLocaleString("id-ID"); }

    function buatKartu(produk, index) {
      const warna = WARNA_CARD[index % WARNA_CARD.length];
      return `
        <div class="product-card">
          <div class="product-img">
            <div class="product-img-inner ${warna}">
              <img src="${produk.foto}" alt="${produk.nama}" loading="lazy" onerror="this.style.display='none'">
            </div>
          </div>
          <div class="product-info">
            <p class="product-name">${produk.nama}</p>
            <div class="product-price-row">
              <span class="product-price">${formatHarga(produk.harga)}</span>
            </div>
          </div>
        </div>`;
    }

    let semuaProduk = [];
    let kategoriAktif = "";
    const params = new URLSearchParams(window.location.search);
    const katDariURL = params.get("kat") || "";

    function updateJudul() {
      const judul = document.getElementById("kat-judul");
      const sub = document.getElementById("kat-sub");
      const tampil = kategoriAktif === "Semua"
        ? semuaProduk
        : semuaProduk.filter(p => p.kategori === kategoriAktif);

      if (kategoriAktif === "Semua") {
        judul.innerHTML = `Ghote <em>Florist</em>`;
        document.title = "Katalog Produk – Ghote Florist";
      } else {
        const [depan, ...belakang] = kategoriAktif.split(" ");
        judul.innerHTML = `${depan} <em>${belakang.join(" ")}</em>`;
        document.title = `${kategoriAktif} – Ghote Florist`;
      }
      sub.textContent = `${tampil.length} produk tersedia`;
    }

    function renderFilter() {
      const bar = document.getElementById("kat-filter");
      bar.innerHTML = ["Semua", ...KATEGORI_ORDER].map(k => `
        <button class="kat-filter-btn ${kategoriAktif === k ? "active" : ""}" onclick="setKategori('${k}')">
          ${k}
        </button>`).join("");
    }

    function renderGrid() {
      const container = document.getElementById("kat-grid-container");
      const tampil = kategoriAktif === "Semua"
        ? semuaProduk
        : semuaProduk.filter(p => p.kategori === kategoriAktif);

      if (tampil.length === 0) {
        container.innerHTML = `<div class="kat-empty"><div class="kat-empty-icon">🌸</div><p>Belum ada produk di kategori ini.</p></div>`;
        return;
      }

      if (kategoriAktif === "Semua") {
        let html = "";
        KATEGORI_ORDER.forEach(kat => {
          const list = semuaProduk.filter(p => p.kategori === kat);
          if (list.length === 0) return;
          html += `<div class="kat-grid">${list.map((p, i) => buatKartu(p, i)).join("")}</div>`;
        });
        container.innerHTML = html;
      } else {
        container.innerHTML = `<div class="kat-grid">${tampil.map((p, i) => buatKartu(p, i)).join("")}</div>`;
      }
    }

    function setKategori(kat) {
      kategoriAktif = kat;
      const url = kat === "Semua"
        ? "katalog-kategori.html"
        : `katalog-kategori.html?kat=${encodeURIComponent(kat)}`;
      window.history.pushState({}, "", url);
      updateJudul();
      renderFilter();
      renderGrid();
      document.getElementById("kat-hero").scrollIntoView({ behavior: "smooth" });
    }

    document.addEventListener("DOMContentLoaded", async () => {
      try {
        semuaProduk = await fetchSemuaProduk();
        kategoriAktif = KATEGORI_ORDER.includes(katDariURL) ? katDariURL : "Semua";
        updateJudul();
        renderFilter();
        renderGrid();
      } catch {
        document.getElementById("kat-grid-container").innerHTML = `
          <div class="kat-empty"><div class="kat-empty-icon">⚠️</div><p>Produk tidak dapat dimuat.</p></div>`;
        document.getElementById("kat-sub").textContent = "";
      }
    });
  </script>

</body>
</html>
